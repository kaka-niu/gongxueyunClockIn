name: 工学云自动签到

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '打卡模式'
        required: true
        default: 'manual'
        type: choice
        options:
        - manual
        - morning
        - evening

  schedule:
    - cron: '0 23 * * *'  # UTC 23:00 = 北京时间 7:00（上班卡）
    - cron: '0 9 * * *'   # UTC 9:00  = 北京时间 17:00（下班卡）

jobs:
  check-in:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 确定打卡模式（基于北京时间）
      id: set-mode
      run: |
        BEIJING_HOUR=$(TZ='Asia/Shanghai' date +%H)
        echo "当前北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "manual" ]; then
            if [ "$BEIJING_HOUR" -lt 12 ]; then
              MODE="morning"
            else
              MODE="evening"
            fi
          fi
        else
          if [ "$BEIJING_HOUR" -lt 12 ]; then
            MODE="morning"
          else
            MODE="evening"
          fi
        fi

        echo "打卡模式: $MODE"
        echo "mode=$MODE" >> $GITHUB_OUTPUT

    - name: 执行打卡
      env:
        USERS: ${{ secrets.USERS }}
        MODE: ${{ steps.set-mode.outputs.mode }}
      run: |
        python auto.py